name: Pipeline AppSec - Evolution (Phase 1 & 2)

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_phase2:
        description: 'Run the self-hosted Phase 2 LLM audit job'
        required: false
        default: 'false'

jobs:
  triage-phase1:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Config Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # --- PHASE 1 RUN ---
    - name: Run Phase 1 - Deterministic Check
      run: |
        echo "--> Executing Phase 1: Basic String Matching"
        python phase1-deterministic/appsec_triage.py

  triage-phase2-self-hosted:
    needs: triage-phase1
    if: github.event_name == 'workflow_dispatch' && inputs.run_phase2 == 'true'
    runs-on: [self-hosted, linux]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Config Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Phase 2 - Local LLM Audit on Self-Hosted Runner
      env:
        OLLAMA_URL: http://localhost:11434/api/generate
        MODEL_NAME: llama3.1
      run: |
        echo "--> Executing Phase 2 on self-hosted runner with local LLM access"
        python phase2-local-llm/appsec_llm_triage.py