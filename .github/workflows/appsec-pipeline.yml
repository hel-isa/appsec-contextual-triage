name: Pipeline AppSec - Evolution (Phase 1 & 2)

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_phase2:
        description: 'Run the Phase 2 local LLM audit job on a GitHub-hosted runner'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  triage-phase1:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Config Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # --- PHASE 1 RUN ---
    - name: Run Phase 1 - Deterministic Check
      run: |
        echo "--> Executing Phase 1: Basic String Matching"
        python phase1-deterministic/appsec_triage.py

  triage-phase2-hosted:
    needs: triage-phase1
    if: github.event_name == 'workflow_dispatch' && inputs.run_phase2 == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Config Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Start Ollama container
      run: |
        docker run -d --name ollama \
          -p 11434:11434 \
          ollama/ollama:0.3.14

    - name: Wait for Ollama API
      run: |
        for i in $(seq 1 60); do
          if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null; then
            exit 0
          fi
          sleep 2
        done
        echo "Ollama API did not become ready in time"
        docker logs ollama
        exit 1

    - name: Pull model
      run: |
        docker exec ollama ollama pull llama3.2:3b

    - name: Run Phase 2 - Local LLM Audit on Hosted Runner
      env:
        OLLAMA_URL: http://localhost:11434/api/generate
        MODEL_NAME: llama3.2:3b
      run: |
        echo "--> Executing Phase 2 on GitHub-hosted runner with local Ollama container"
        python phase2-local-llm/appsec_llm_triage.py

    - name: Show Ollama logs on failure
      if: failure()
      run: docker logs ollama